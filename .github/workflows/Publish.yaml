name: Publish Module
on:
  push:
    branches:
      - 'main'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override in semver form, for example 1.0.1'
        required: false
        type: string
      force:
        description: 'Publish even if the version already exists in PSGallery'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Validate the publish workflow without publishing'
        required: false
        type: boolean
        default: false
      create_release:
        description: 'Create the GitHub release and tag metadata'
        required: false
        type: boolean
        default: true
      publish:
        description: 'Publish the module to the PowerShell Gallery'
        required: false
        type: boolean
        default: true

jobs:
  publish:
    uses: HeyItsGilbert/.github/.github/workflows/PublishModule.yml@main
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
      force: ${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      create_release: ${{ github.event_name == 'workflow_dispatch' && inputs.create_release || true }}
      publish: ${{ github.event_name == 'workflow_dispatch' && inputs.publish || true }}
    secrets:
      PS_GALLERY_KEY: ${{ secrets.PS_GALLERY_KEY }}
