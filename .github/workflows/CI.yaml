name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      skipWindowsPowerShell:
        description: 'Skip Windows PowerShell 5.1 tests (use for pwsh 7-only modules)'
        type: boolean
        default: false

jobs:
  ci:
    uses: HeyItsGilbert/.github/.github/workflows/ModuleCI.yml@main
    with:
      skipWindowsPowerShell: ${{ github.event_name == 'workflow_dispatch' && inputs.skipWindowsPowerShell || false }}
